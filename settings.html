<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="styles_settings.css">
</head>

<body>
    <div class="settings-container">
        <h1>Settings</h1>

        <div class="setting-item">
            <label for="gather-speaker">Gather Same Speaker Dialogue</label>
            <input type="checkbox" id="gather-speaker" checked>
        </div>

        <div class="setting-item">
            <label for="font-size">Font Size</label>
            <input type="range" id="font-size" min="12" max="32" value="20">
        </div>

        <button id="close-settings" class="btn">Close</button>
    </div>

    <script src="script_settings.js"></script>
</body>

</html>
